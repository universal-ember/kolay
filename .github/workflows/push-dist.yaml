name: Push dist

on:
  push:
    branches:
      - main
      - vite

jobs:
  push-dist:
    name: Push dist
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - run: npm i -g pnpm && pnpm i
      - uses: kategengler/put-built-npm-package-contents-on-branch@v2.1.0
        with:
          branch: dist-kolay
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: .
      - uses: kategengler/put-built-npm-package-contents-on-branch@v2.1.0
        with:
          branch: dist-kolay-ui
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: ./ui

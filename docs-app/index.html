<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>DocsApp</title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2.0.6/css/pico.min.css"
    />
    <script type="module">
      // for styles
      import "nvp.ui";
    </script>
    <link integrity="" rel="stylesheet" href="./src/styles/app.css" />

    <!-- VITE_EMBER_SSR_HEAD -->

    <style>
      #kolay__loading {
        position: fixed;
        inset: 0;
        background: #111;
        color: white;
        font-size: 4rem;
        z-index: 10;
        font-family: "System UI", "System";
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        gap: 4rem;

        [aria-busy="true"] {
          background: #111;
        }
      }
    </style>
  </head>
  <body>
    <!-- VITE_EMBER_SSR_BODY -->
    <script src="/@embroider/virtual/vendor.js"></script>
    <script type="module">
      // Clean up SSR-rendered content before Ember boots.
      // Inlined from vite-ember-ssr/client to avoid requiring the
      // package in the client build (it's only needed server-side).
      {
        const start = document.getElementById("ssr-body-start");
        const end = document.getElementById("ssr-body-end");
        if (start && end && start.parentNode) {
          let node = start;
          while (node) {
            const next = node.nextSibling;
            start.parentNode.removeChild(node);
            if (node === end) break;
            node = next;
          }
        }
      }

      const { default: Application } = await import("#src/app.ts");
      const { default: environment } = await import("#config");

      Application.create(environment.APP);
    </script>

    <div id="kolay__loading">
      Kolay
      <div aria-busy="true"></div>
    </div>
  </body>
</html>
